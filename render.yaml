databases:
  - name: shecan-db
    databaseName: shecan
    user: shecan_user

services:
  - type: web
    name: shecan-backend
    env: docker
    rootDir: backend
    buildCommand: mvn clean package -DskipTests
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /api-docs
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shecan-db
          property: connectionString
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: ADMIN_SECRET_KEY
        sync: false
      - key: PORT
        value: 8080

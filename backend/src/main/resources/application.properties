# ── Database (Neon PostgreSQL) ─────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://ep-square-glade-ao4m3mww-pooler.c-2.ap-southeast-1.aws.neon.tech/neondb?sslmode=require}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:neondb_owner}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:npg_uY9ZDT4fMJlv}

# ── Brevo SMTP ───────────────────────────────────────────────────────────────
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:noreply@shecanfoundation.org}
spring.mail.password=${MAIL_PASSWORD:changeme}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

# ── App config ───────────────────────────────────────────────────────────────
app.mail.dev-mode=true
app.admin.email=president@shecanfoundation.org
app.admin.secret-key=${ADMIN_SECRET_KEY:shecan-admin-2025}

# ── Server ───────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Swagger ──────────────────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ── Async thread pool ────────────────────────────────────────────────────────
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=25
